name: Validate predictions

on:
  pull_request:
    paths:
      - "results/**/predictions.csv"
      - "tools/validate_predictions.py"
      - ".github/workflows/validate-predictions.yml"
      - "DEVELOPMENT.md"
      - "results/README.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate date-snapshot predictions
        run: python3 tools/validate_predictions.py --all
